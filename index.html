<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Study Tracker Enhanced</title>
<style>
body{background:#09090f;color:#e2e0da;font-family:sans-serif}
canvas{width:100%;background:#0f0f18;border-radius:10px;margin:10px 0}
.missed{color:#ef4444;font-size:10px}
button{margin:4px;padding:6px 10px;border-radius:6px;border:none;background:#f0c040}
</style>
</head>
<body>
<h2>Study Tracker (Enhanced)</h2>
<canvas id="trendChart" height="120"></canvas>
<div id="app"></div><script>
const SUBS=["Phy","Chem","Maths"];
let records=JSON.parse(localStorage.getItem("sty_v2")||"{}");
let testsList=JSON.parse(localStorage.getItem("sty_tests")||"[]");
let timerStart=null;

function persist(){localStorage.setItem("sty_v2",JSON.stringify(records));}
function persistTests(){localStorage.setItem("sty_tests",JSON.stringify(testsList));}

function today(){return new Date().toISOString().slice(0,10)}

function isEmptyDay(d){
 const rec=records[d]||{};
 return !SUBS.some(sub=>{
  const e=rec[sub]||[];
  return e.some(x=>Number(x.q)>0||Number(x.h)>0);
 });
}

function getDailyQData(){
 const days=Object.keys(records).sort();
 return days.map(d=>SUBS.reduce((s,sub)=>{
  const e=records[d]?.[sub]||[];
  return s+e.reduce((ss,x)=>ss+(Number(x.q)||0),0);
 },0));
}

function drawChart(){
 const canvas=document.getElementById("trendChart");
 const ctx=canvas.getContext("2d");
 const data=getDailyQData();
 if(!data.length) return;
 const w=canvas.width,h=canvas.height;
 ctx.clearRect(0,0,w,h);
 const max=Math.max(...data,10);
 const step=w/(data.length-1||1);
 ctx.beginPath();
 data.forEach((v,i)=>{
  const x=i*step;
  const y=h-(v/max)*h;
  if(i===0) ctx.moveTo(x,y);
  else ctx.lineTo(x,y);
 });
 ctx.strokeStyle="#f0c040";
 ctx.stroke();
}

function startTimer(){timerStart=Date.now();}
function stopTimer(sub){
 if(!timerStart) return;
 const d=today();
 const hrs=(Date.now()-timerStart)/3600000;
 timerStart=null;
 if(!records[d]) records[d]={};
 if(!records[d][sub]) records[d][sub]=[];
 records[d][sub].push({q:"",h:hrs.toFixed(2),chapter:""});
 persist();render();
}

function addTest(){
 const t={
  id:Date.now(),
  date:document.getElementById("tdate").value,
  total:Number(document.getElementById("ttotal").value)||0,
  mistakes:Number(document.getElementById("tmistakes").value)||"",
  notes:document.getElementById("tnotes").value||""
 };
 testsList.push(t);
 persistTests();render();
}

function render(){
 const root=document.getElementById("app");
 const days=Object.keys(records).sort().reverse();
 root.innerHTML=`
  <div>
    <button onclick="startTimer()">Start</button>
    <button onclick="stopTimer('Phy')">Stop Phy</button>
  </div>
  <h3>Add Test</h3>
  <input id="tdate" type="date" value="${today()}" />
  <input id="ttotal" placeholder="score" />
  <input id="tmistakes" placeholder="mistakes" />
  <input id="tnotes" placeholder="notes" />
  <button onclick="addTest()">Save Test</button>
  <h3>Days</h3>
  ${days.map(d=>`
    <div>
      ${d} ${isEmptyDay(d)?'<span class="missed">MISSED</span>':''}
    </div>`).join('')}
  <h3>Tests</h3>
  ${testsList.map(t=>`
    <div>
      ${t.date} - ${t.total}
      ${t.mistakes?`<div>Mistakes: ${t.mistakes}</div>`:''}
      ${t.notes?`<div>${t.notes}</div>`:''}
    </div>`).join('')}
 `;
 drawChart();
}

render();
</script></body>
</html>
